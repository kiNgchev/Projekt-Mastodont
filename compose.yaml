name: 'akhs-deploy'

services:
  kafka:
    image: confluentinc/cp-kafka:8.0.0
    restart: always
    hostname: kafka
    ports:
      - "29092:29092"
      - "9093:9092"
    networks:
      - kafka
    volumes:
      - kafka_data:/var/lib/kafka/data
    environment:
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 2
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_NODE_ID: 2
      CLUSTER_ID: FWB1GS-aQ82liSaRpz1CHA
      KAFKA_PROCESS_ROLES: controller,broker
      KAFKA_CONTROLLER_QUORUM_VOTERS: 2@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://0.0.0.0:9092,CONTROLLER://kafka:9093
    healthcheck:
      test: kafka-topics --bootstrap-server localhost:9092 --list
      interval: 10s
      timeout: 5s
      start_period: 30s
      retries: 5
  kafka-ui:
    image: provectuslabs/kafka-ui:v0.7.2
    restart: on-failure
    ports:
      - "8989:8080"
    networks:
      - kafka
    environment:
      DYNAMIC_CONFIG_ENABLED: "true"
      KAFKA_CLUSTERS_0_NAME: FWB1GS-aQ82liSaRpz1CHA
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
    healthcheck:
      test: wget --no-verbose --tries=1 --spider http://localhost:8080/actuator/health || exit -1
      interval: 10s
      timeout: 5s
      start_period: 60s
      retries: 5
    depends_on:
      - kafka


  postgres:
    image: postgres:latest
    shm_size: 128mb
    environment:
      POSTGRES_DB: akhs
      POSTGRES_PASSWORD: secret
      POSTGRES_USER: postgres
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d akhs" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
    volumes:
      - ./data/postgresql:/var/lib/postgresql/data/
  redis:
    image: redis:latest
    ports:
      - "6379:6379"
  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - "./config/prometheus/prometheus.yaml:/etc/prometheus/prometheus.yml"
      - "./data/prometheus:/prometheus"
    networks:
      - monitoring
  grafana:
    image: grafana/grafana-enterprise:latest
    environment:
      GF_SECURITY_ADMIN_USER: grafana
      GF_SECURITY_ADMIN_PASSWORD: secret
    ports:
      - "3000:3000"
    volumes:
      - "./data/grafana:/var/lib/grafana"
      - "./config/grafana/provisioning:/etc/grafana/provisioning"
    networks:
      - monitoring
  loki:
    image: grafana/loki:latest
    ports:
      - "3100:3100"
    networks:
      - monitoring

  nivora-bot:
    build:
      dockerfile: Dockerfile-JVM
      args:
        JAR_FILE: nivora/build/libs/nivora.jar
    environment:
      SPRING_PROFILES_ACTIVE: cloud
      LOKI: http://host.docker.internal:3100
    networks:
      - bots
    ports:
      - "7072:7072"
  serafim-bot:
    build:
      dockerfile: Dockerfile-JVM
      args:
        JAR_FILE: serafim/build/libs/serafim.jar
    environment:
      SPRING_PROFILES_ACTIVE: cloud
      LOKI: http://host.docker.internal:3100
    networks:
      - bots
    ports:
      - "7071:7071"
  zentra-bot:
    build:
      dockerfile: Dockerfile-JVM
      args:
        JAR_FILE: zentra/build/libs/zentra.jar
    environment:
      LOKI: http://host.docker.internal:3100
    networks:
      - bots
    ports:
      - "7070:7070"

networks:
  kafka:
    driver: bridge
  bots:
    driver: bridge
  monitoring:
    name: monitoring